name: Deprecate version
on:
  workflow_dispatch:
    inputs:
      package:
        description: Package
        required: true
        type: choice
        options:
          - '@discord-selfbot-sdk/builders'
          - '@discord-selfbot-sdk/collection'
          - '@discord-selfbot-sdk/core'
          - '@discord-selfbot-sdk/formatters'
          - 'discord.js'
          - '@discord-selfbot-sdk/rest'
          - '@discord-selfbot-sdk/structures'
          - '@discord-selfbot-sdk/util'
          - '@discord-selfbot-sdk/voice'
          - '@discord-selfbot-sdk/ws'
      version:
        description: Version(s)
        required: true
        type: string
      message:
        description: Deprecation message
        required: false
        type: string
jobs:
  deprecate:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Dijnie'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        uses: ./packages/actions/src/pnpmCache

      - name: Deprecate
        uses: ./packages/actions/src/deprecateVersion
        with:
          package: ${{ inputs.package }}
          version: ${{ inputs.version }}
          message: ${{ inputs.message }}
          node-auth-token: ${{ secrets.NPM_PUBLISH_TOKEN }}
